<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jenworker — AI Lead Generation</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d12;
    --panel: #12151c;
    --border: #232733;
    --text: #e8eaf0;
    --muted: #9aa1b1;
    --accent: #6d5bff;
    --accent-text: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 4rem 1.5rem 2rem;
    text-align: center;
  }
  header h1 { font-size: 2rem; margin: 0 0 0.5rem; }
  header p { color: var(--muted); margin: 0; }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .card h2 { margin-top: 0; font-size: 1.1rem; }
  textarea, input, select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    font-size: 0.95rem;
    font-family: inherit;
  }
  textarea { min-height: 5rem; resize: vertical; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0.75rem 0 0.25rem; }
  button {
    margin-top: 1rem;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.25rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .status { font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
  .status.error { color: #ff6b6b; }
  .status.ok { color: #4ade80; }
  .chat-log { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; max-height: 320px; overflow-y: auto; }
  .msg { padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.9rem; max-width: 85%; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--accent-text); }
  .msg.assistant { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); }
  .chat-input-row { display: flex; gap: 0.5rem; }
  .chat-input-row input { flex: 1; }
  .chat-input-row button { margin-top: 0; }
</style>
</head>
<body>
<header>
  <h1>Jenworker</h1>
  <p>Describe your ideal customer. We'll find them, enrich them, and help you reach out.</p>
</header>

<main>
  <section class="card">
    <h2>Find your leads</h2>
    <label for="prospect-prompt">Who are you looking for?</label>
    <textarea id="prospect-prompt" placeholder="e.g. Series A fintech startups in the US hiring for sales roles"></textarea>
    <label for="prospect-mode">Mode</label>
    <select id="prospect-mode">
      <option value="profile">Describe a customer profile</option>
      <option value="domain">I have a company domain</option>
    </select>
    <button id="prospect-submit">Generate plan</button>
    <p id="prospect-status" class="status"></p>
    <pre id="prospect-result" hidden></pre>
  </section>

  <section class="card">
    <h2>Get started</h2>
    <label for="lead-email">Your email</label>
    <input id="lead-email" type="email" placeholder="you@company.com" />
    <button id="lead-submit">Start free</button>
    <p id="lead-status" class="status"></p>
  </section>

  <section class="card">
    <h2>Ask us anything</h2>
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="How does prospecting work?" />
      <button id="chat-submit">Send</button>
    </div>
    <p id="chat-status" class="status"></p>
  </section>
</main>

<script>
  async function postJSON(url, body) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || "Request failed.");
    return data;
  }

  // ---------- Prospect ----------
  const prospectBtn = document.getElementById("prospect-submit");
  const prospectStatus = document.getElementById("prospect-status");
  const prospectResult = document.getElementById("prospect-result");

  prospectBtn.addEventListener("click", async () => {
    const prompt = document.getElementById("prospect-prompt").value.trim();
    const mode = document.getElementById("prospect-mode").value;
    if (prompt.length < 3) {
      prospectStatus.textContent = "Describe the lead you want to find.";
      prospectStatus.className = "status error";
      return;
    }
    prospectBtn.disabled = true;
    prospectStatus.textContent = "Thinking...";
    prospectStatus.className = "status";
    prospectResult.hidden = true;
    try {
      const data = await postJSON("/api/prospect", { prompt, mode });
      prospectResult.textContent = JSON.stringify(data.result, null, 2);
      prospectResult.hidden = false;
      prospectStatus.textContent = "";
    } catch (err) {
      prospectStatus.textContent = err.message;
      prospectStatus.className = "status error";
    } finally {
      prospectBtn.disabled = false;
    }
  });

  // ---------- Lead capture ----------
  const leadBtn = document.getElementById("lead-submit");
  const leadStatus = document.getElementById("lead-status");

  leadBtn.addEventListener("click", async () => {
    const email = document.getElementById("lead-email").value.trim();
    const prompt = document.getElementById("prospect-prompt").value.trim();
    leadBtn.disabled = true;
    leadStatus.textContent = "";
    try {
      await postJSON("/api/leads", { email, source: "site-cta", prompt });
      leadStatus.textContent = "You're in! We'll be in touch.";
      leadStatus.className = "status ok";
    } catch (err) {
      leadStatus.textContent = err.message;
      leadStatus.className = "status error";
    } finally {
      leadBtn.disabled = false;
    }
  });

  // ---------- Chat ----------
  const chatLog = document.getElementById("chat-log");
  const chatInput = document.getElementById("chat-input");
  const chatBtn = document.getElementById("chat-submit");
  const chatStatus = document.getElementById("chat-status");
  const chatHistory = [];

  function renderMessage(role, content) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = content;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  async function sendChat() {
    const content = chatInput.value.trim();
    if (!content) return;
    chatHistory.push({ role: "user", content });
    renderMessage("user", content);
    chatInput.value = "";
    chatBtn.disabled = true;
    chatStatus.textContent = "";
    try {
      const data = await postJSON("/api/chat", { messages: chatHistory });
      chatHistory.push({ role: "assistant", content: data.reply });
      renderMessage("assistant", data.reply);
    } catch (err) {
      chatStatus.textContent = err.message;
      chatStatus.className = "status error";
    } finally {
      chatBtn.disabled = false;
    }
  }

  chatBtn.addEventListener("click", sendChat);
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendChat();
  });
</script>
</body>
</html>
